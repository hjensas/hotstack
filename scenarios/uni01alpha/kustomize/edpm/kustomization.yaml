---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the cloned and patched architecture repo.
# The ../../ path resolves from manifests_dir (/home/zuul/manifests/kustomize/edpm)
# back to /home/zuul/manifests/architecture/examples/dt/uni01alpha/edpm
# Note: Nodeset resources are in examples/dt/, deployment components are in dt/
resources:
  - ../../architecture/examples/dt/uni01alpha/edpm

# Merge hotstack-specific overrides
patches:
  - path: hotstack-values.yaml
